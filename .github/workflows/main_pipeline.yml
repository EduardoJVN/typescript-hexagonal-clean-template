name: CI/CD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: [develop, qa, main]
  create:

jobs:
  quality-check:
    name: 🔍 Calidad (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'
      - name: 📦 Install
        run: yarn install --frozen-lockfile
      - name: 🔍 Lint & Test
        run: |
          yarn lint
          yarn test

  build-check:
    name: 🏗️ Build Verification
    needs: quality-check
    runs-on: ubuntu-latest
    # Ejecutar si es una rama principal, un PR hacia ellas, o la creación de un Tag
    if: |
      contains(fromJSON('["refs/heads/main", "refs/heads/develop", "refs/heads/qa"]'), github.ref) ||
      github.event_name == 'pull_request' ||
      github.event.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn'
      - name: 📦 Install
        run: yarn install --frozen-lockfile
      - name: 🏗️ Build
        run: yarn build

  deploy:
    name: 🚀 Build & Push to GHCR
    needs: build-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Vital para poder subir la imagen a GHCR
    # Solo despliega en PUSH a dev/qa O cuando se crea un TAG (PROD)
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/qa')) ||
      (github.event_name == 'create' && github.event.ref_type == 'tag')

    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v4

      - name: 🔐 Login to GHCR (Only for Dev)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Determine Tag Name
        id: vars
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "env_tag=dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/qa" ]]; then
            echo "env_tag=qa" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.ref_type }}" == "tag" ]]; then
            # Extrae solo el nombre del tag (ej: v1.0.0)
            echo "env_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: 🏷️ Set Lowercase Repository Name
        id: repo_name
        run: |
          # Convierte 'Usuario/Repo' a 'usuario/repo' y lo guarda en los outputs del step
          echo "lowercase=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: 🏗️ Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # La imagen se llamará ghcr.io/tu-usuario/nombre-del-repo:tag
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.lowercase }}:${{ steps.vars.outputs.env_tag }}
            ghcr.io/${{ steps.repo_name.outputs.lowercase }}:latest

      - name: ✅ Summary
        run: |
          echo "Imagen subida exitosamente con el tag: ${{ steps.vars.outputs.env_tag }}"
